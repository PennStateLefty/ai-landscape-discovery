name: build-release

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  actions: read
  contents: write
  security-events: write

jobs:
  dependency-vulnerability-scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Scan NuGet dependencies
        shell: pwsh
        run: |
          $output = dotnet list AiLandscapeDiscovery.sln package --vulnerable --include-transitive 2>&1
          $output | Write-Output
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          if ($output -match 'has the following vulnerable packages') {
            throw 'Vulnerable NuGet packages were found.'
          }

  codeql:
    name: CodeQL analysis
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  build-windows:
    needs:
      - dependency-vulnerability-scan
      - codeql
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release --no-restore

      - name: Publish win-x64
        shell: pwsh
        run: |
          dotnet publish src/AiLandscapeDiscovery.Cli/AiLandscapeDiscovery.Cli.csproj `
            --configuration Release `
            --runtime win-x64 `
            --output artifacts/win-x64

      - name: Validate executable
        shell: pwsh
        run: .\artifacts\win-x64\ai-landscape-discovery.exe --help

      - name: Package release bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/release | Out-Null
          Copy-Item artifacts/win-x64/ai-landscape-discovery.exe artifacts/release/
          Copy-Item README.md artifacts/release/
          Copy-Item docs artifacts/release/docs -Recurse
          Compress-Archive -Path artifacts/release/* -DestinationPath artifacts/ai-landscape-discovery-win-x64.zip -Force
          Get-FileHash artifacts/ai-landscape-discovery-win-x64.zip -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  ai-landscape-discovery-win-x64.zip" } |
            Out-File artifacts/ai-landscape-discovery-win-x64.zip.sha256 -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-landscape-discovery-win-x64
          path: |
            artifacts/ai-landscape-discovery-win-x64.zip
            artifacts/ai-landscape-discovery-win-x64.zip.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ai-landscape-discovery-win-x64
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            artifacts/ai-landscape-discovery-win-x64.zip \
            artifacts/ai-landscape-discovery-win-x64.zip.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "Self-contained Windows x64 AI Landscape Discovery release."
